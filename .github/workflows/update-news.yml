name: Update School News

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest news from Facebook
        run: |
          curl -s "https://rss.app/feeds/v1.1/YVxBG5SHs7KGXckm.json" -o news.json

      - name: Merge News Script
        run: node merge-news.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Архівування та оновлення новин з Facebook" && git push)
